random_seed: 42

dataset:
  # May point to the extracted dataset directory OR directly to dataset_roads.zip.
  # Keep this external to the Git repository.
  path: "/Users/insarek/Documents/work/1task(roads)/dataset_roads.zip"
  image_size: 256
  mask_threshold: 128
  split:
    train: 0.8
    val: 0.1
    test: 0.1

model:
  in_channels: 3
  # Set to 64 to match the original notebook's channel width; 32 uses less memory.
  base_channels: 32

loss:
  bce_weight: 0.5
  dice_weight: 0.5

augmentation:
  horizontal_flip: 0.5
  vertical_flip: 0.5
  rotation_degrees: 20
  brightness_contrast: 0.2

training:
  epochs: 50
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0
  device: auto
  threshold: 0.5
  monitor: iou
  early_stopping_patience: 10

paths:
  output_dir: outputs
